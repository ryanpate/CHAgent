<div class="flex flex-wrap items-center gap-2" id="reaction-bar-{{ post.pk }}">
    {% for rtype, rdata in reaction_summary.items %}
    <button hx-post="{% url 'studio_post_react' post.pk %}"
            hx-vals='{"reaction_type": "{{ rtype }}"}'
            hx-target="#reaction-bar-{{ post.pk }}"
            hx-swap="outerHTML"
            class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm cursor-pointer transition {% if rdata.user_reacted %}bg-ch-gold/20 border border-ch-gold/40 text-ch-gold{% else %}bg-ch-gray border border-gray-700 text-gray-400 hover:border-gray-500{% endif %}">
        {{ rdata.emoji }} {{ rdata.count }}
    </button>
    {% endfor %}

    <!-- Add reaction dropdown -->
    <div class="relative" x-data="{ open: false }">
        <button @click="open = !open"
                class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm bg-ch-gray border border-gray-700 text-gray-400 hover:border-gray-500 cursor-pointer transition">
            +
        </button>
        <div x-show="open" @click.away="open = false"
             class="absolute bottom-full mb-2 left-0 bg-ch-dark border border-gray-700 rounded-lg p-2 flex gap-1 shadow-lg z-10">
            {% for value, label in reaction_choices %}
            <button hx-post="{% url 'studio_post_react' post.pk %}"
                    hx-vals='{"reaction_type": "{{ value }}"}'
                    hx-target="#reaction-bar-{{ post.pk }}"
                    hx-swap="outerHTML"
                    @click="open = false"
                    class="w-8 h-8 flex items-center justify-center rounded hover:bg-ch-gray transition cursor-pointer text-lg"
                    title="{{ label }}">
                {{ label }}
            </button>
            {% endfor %}
        </div>
    </div>
</div>
