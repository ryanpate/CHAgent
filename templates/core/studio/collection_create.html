{% extends 'base.html' %}

{% block title %}{% if collection %}Edit Collection{% else %}New Collection{% endif %}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <!-- Breadcrumb -->
    <div class="flex items-center gap-2 text-sm text-gray-400 mb-6">
        <a href="{% url 'studio_feed' %}" class="hover:text-white transition">Creative Studio</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <a href="{% url 'studio_collection_list' %}" class="hover:text-white transition">Collections</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <span class="text-white">{% if collection %}Edit{% else %}New Collection{% endif %}</span>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <!-- Name -->
        <div>
            <label for="name" class="block text-sm font-medium text-gray-300 mb-2">Name</label>
            <input type="text" id="name" name="name" value="{% if collection %}{{ collection.name }}{% endif %}" required
                   placeholder="Collection name..."
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-ch-gold focus:outline-none">
        </div>

        <!-- Description -->
        <div>
            <label for="description" class="block text-sm font-medium text-gray-300 mb-2">Description <span class="text-gray-500">(optional)</span></label>
            <textarea id="description" name="description" rows="4"
                      placeholder="What is this collection about?"
                      class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-ch-gold focus:outline-none resize-y">{% if collection %}{{ collection.description }}{% endif %}</textarea>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3 pt-4 border-t border-gray-800">
            <button type="submit"
                    class="bg-ch-gold text-ch-darker px-6 py-2 rounded-lg font-semibold hover:bg-yellow-500 transition">
                {% if collection %}Save Changes{% else %}Create Collection{% endif %}
            </button>
            <a href="{% url 'studio_collection_list' %}" class="px-6 py-2 text-gray-400 hover:text-white transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
