<div id="milestone-{{ milestone.id }}" class="flex items-center gap-3 py-3 px-4 rounded-lg {% if milestone.status == 'completed' %}bg-ch-dark/50{% else %}bg-ch-dark{% endif %}">
    <form hx-post="{% url 'milestone_toggle' milestone.id %}" hx-target="#milestone-{{ milestone.id }}" hx-swap="outerHTML">
        {% csrf_token %}
        <button type="submit" class="w-5 h-5 rounded-full border-2 flex items-center justify-center {% if milestone.status == 'completed' %}border-green-500 bg-green-500{% elif milestone.is_overdue %}border-red-500{% else %}border-gray-500{% endif %}">
            {% if milestone.status == 'completed' %}
            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
            {% endif %}
        </button>
    </form>
    <div class="flex-1 min-w-0">
        <p class="font-medium {% if milestone.status == 'completed' %}line-through text-gray-500{% endif %}">{{ milestone.title }}</p>
        {% if milestone.description %}<p class="text-sm text-gray-400 truncate">{{ milestone.description }}</p>{% endif %}
    </div>
    <div class="flex items-center gap-2 text-sm">
        <span class="{% if milestone.is_overdue %}text-red-400{% elif milestone.status == 'completed' %}text-green-400{% else %}text-gray-400{% endif %}">
            {{ milestone.due_date|date:"M j" }}
        </span>
        <form hx-post="{% url 'milestone_delete' milestone.id %}" hx-target="#milestone-{{ milestone.id }}" hx-swap="outerHTML" hx-confirm="Delete this milestone?">
            {% csrf_token %}
            <button type="submit" class="text-gray-600 hover:text-red-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </form>
    </div>
</div>
