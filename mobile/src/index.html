<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ARIA</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="app">
        <!-- Login screen shown when no auth token stored -->
        <div id="login-screen" style="display: none;">
            <div class="login-container">
                <img src="./logo.png" alt="ARIA" class="logo">
                <h1>ARIA</h1>
                <p class="subtitle">AI Worship Team Management</p>
                <form id="login-form">
                    <input type="email" id="email" placeholder="Email" required autocomplete="email" autocapitalize="none" autocorrect="off">
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                    <button type="submit" id="login-btn">Sign In</button>
                    <p id="login-error" class="error" style="display: none;"></p>
                </form>
            </div>
        </div>

        <!-- Tab bar (shown after auth) -->
        <div id="tab-bar" style="display: none;">
            <nav class="tabs">
                <button class="tab active" data-url="/chat/">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    <span>Chat</span>
                </button>
                <button class="tab" data-url="/volunteers/">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span>Volunteers</span>
                </button>
                <button class="tab" data-url="/followups/">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    <span>Follow-ups</span>
                </button>
                <button class="tab" data-url="/comms/">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 11v2h4v-2h-4zm-2 6.61c.96.71 2.21 1.65 3.2 2.39.4-.53.8-1.07 1.2-1.6-.99-.74-2.24-1.68-3.2-2.4-.4.54-.8 1.08-1.2 1.61zM20.4 5.6c-.4-.53-.8-1.07-1.2-1.6-.99.74-2.24 1.68-3.2 2.4.4.53.8 1.07 1.2 1.6.96-.72 2.21-1.65 3.2-2.4zM4 9c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h1l5 3V6L5 9H4z"/></svg>
                    <span>Comms</span>
                </button>
                <button class="tab" data-url="/more/">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    <span>More</span>
                </button>
            </nav>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
